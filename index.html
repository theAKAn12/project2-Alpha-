<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Al-Barid Electro | Official Domain</title>
    <style>
        :root {
            --bg-main: #d9e2e9;
            --header-peach: #f9e4d4;
            --accent-orange: #fbb03b;
            --accent-red: #ff3b3b;
            --border-black: #000000;
            --input-gray: #bdc3c7;
        }

        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: var(--bg-main); margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .hidden { display: none !important; }

        /* --- الهيدر واللوجو --- */
        .top-bar { width: 95%; max-width: 1000px; background-color: var(--header-peach); border: 4px solid var(--border-black); border-radius: 40px; padding: 10px 25px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .logo-box { display: flex; align-items: center; gap: 10px; }
        .envelope-svg { border: 2px solid #000; background: white; padding: 2px; width: 50px; height: 35px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 8px; font-weight: bold; }
        .brand-text { font-size: 24px; font-weight: bold; }
        .text-barid { color: #ff8c8c; border-bottom: 2px solid #ff8c8c; }
        .text-electro { color: var(--accent-orange); font-style: italic; }

        /* --- البطاقات --- */
        .card { background: white; padding: 25px; border: 4px solid var(--border-black); border-radius: 20px; width: 420px; box-shadow: 10px 10px 0px rgba(0,0,0,0.1); }
        .lang-switch-box { display: flex; gap: 5px; margin-bottom: 15px; justify-content: center; }
        .lang-tag { padding: 5px 12px; border: 2px solid #000; border-radius: 12px; cursor: pointer; font-size: 12px; background: #eee; }
        .lang-tag.active { background: var(--accent-orange); color: white; }

        input, select, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 3px solid #000; border-radius: 10px; box-sizing: border-box; font-size: 15px; }
        .btn-green { width: 100%; padding: 15px; background: #2ecc71; color: white; border: 3px solid #000; font-weight: bold; cursor: pointer; border-radius: 10px; font-size: 18px; }

        /* --- الواجهة الرئيسية --- */
        .main-layout { width: 95%; max-width: 1000px; display: flex; flex-direction: column; gap: 15px; }
        .top-row { display: flex; gap: 20px; align-items: flex-start; }
        .search-area { background: var(--input-gray); border: 4px solid #000; padding: 15px; flex-grow: 1; border-radius: 5px; display: flex; align-items: center; }
        .search-area input { border: none; background: transparent; padding: 0; margin: 0; text-align: right; font-size: 20px; outline: none; }

        .profile-stack { position: relative; cursor: pointer; width: 60px; height: 60px; }
        .yellow-circle { width: 100%; height: 100%; background: #f1c40f; border: 4px solid #000; border-radius: 50%; }
        .red-dot { width: 22px; height: 22px; background: var(--accent-red); border: 3px solid #000; border-radius: 50%; position: absolute; top: 0; left: 0; }

        .sidebar { display: flex; flex-direction: column; gap: 10px; width: 200px; }
        .side-btn { border: 4px solid #000; border-radius: 20px; padding: 15px; font-weight: bold; cursor: pointer; text-align: center; font-size: 18px; }
        .create-btn { background: var(--header-peach); }
        .settings-btn { background: var(--input-gray); }

        /* --- النوافذ --- */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: flex; justify-content: center; align-items: center; z-index: 999; }
        .modal-box { background: white; border: 4px solid #000; border-radius: 20px; width: 500px; padding: 25px; }

        #error-box { color: red; font-size: 13px; text-align: center; font-weight: bold; display: none; margin-bottom: 10px; padding: 5px; background: #ffebeb; border-radius: 5px; }
        .logout-timer { color: red; font-weight: bold; margin-top: 10px; text-align: center; }
    </style>
</head>
<body>

    <div id="auth-screen" class="card">
        <div class="lang-switch-box">
            <div class="lang-tag active" onclick="app.setLang('ar')">العربية</div>
            <div class="lang-tag" onclick="app.setLang('en')">English</div>
            <div class="lang-tag" onclick="app.setLang('fr')">Français</div>
            <div class="lang-tag" onclick="app.setLang('es')">Español</div>
        </div>
        <h2 id="t-reg-title" style="text-align: center;">إنشاء حساب Al-Barid</h2>
        
        <div id="error-box"></div>
        
        <input type="text" id="reg-name" placeholder="الاسم الكامل">
        <select id="reg-country">
            <option value="">-- اختر بلدك / Select Country --</option>
            <option value="MA">المغرب 🇲🇦</option><option value="DZ">الجزائر 🇩🇿</option><option value="EG">مصر 🇪🇬</option>
            <option value="SA">السعودية 🇸🇦</option><option value="TN">تونس 🇹🇳</option><option value="AE">الإمارات 🇦🇪</option>
            <option value="FR">فرنسا 🇫🇷</option><option value="ES">إسبانيا 🇪🇸</option><option value="US">أمريكا 🇺🇸</option>
            <option value="TR">تركيا 🇹🇷</option><option value="CN">الصين 🇨🇳</option>
        </select>
        
        <div style="position: relative;">
            <input type="text" id="reg-email" placeholder="البريد (اسم المستخدم)">
            <span style="position: absolute; left: 10px; top: 18px; color: #7f8c8d; font-weight: bold; font-family: sans-serif;">@brid.com</span>
        </div>
        
        <input type="text" id="reg-pass" placeholder="كلمة المرور (8 أرقام فقط)" maxlength="8">
        
        <button class="btn-green" onclick="app.validateLogin()" id="t-btn-done">تم</button>
    </div>

    <div id="main-app" class="hidden main-layout">
        <header class="top-bar">
            <div class="logo-box">
                <div class="envelope-svg"><div>البريد</div><div>electro</div></div>
                <div class="brand-text">Al-<span class="text-barid">Barid</span> <span class="text-electro">electro</span></div>
            </div>
            <div style="font-size: 30px; font-weight: bold;">الـبـريـد</div>
        </header>

        <div class="top-row">
            <aside class="sidebar">
                <div class="side-btn create-btn" onclick="app.showCompose()">+ إنشاء<br>Create</div>
                <div class="side-btn settings-btn" onclick="app.showSettings()" id="t-side-settings">الإعدادات</div>
            </aside>
            <div class="search-area">
                <input type="text" id="t-search-input" placeholder="ابحث...">
            </div>
            <div class="profile-stack" onclick="app.showSettings()">
                <div class="yellow-circle"></div>
                <div id="notif-red" class="red-dot"></div>
            </div>
        </div>

        <div style="background: white; border: 4px solid #000; border-radius: 15px; padding: 20px; min-height: 300px;">
            <h3 id="welcome-msg">مرحباً بك!</h3>
            <hr>
            <p id="t-empty-inbox">لا توجد رسائل جديدة في بريدك.</p>
        </div>
    </div>

    <div id="compose-modal" class="modal-overlay hidden">
        <div class="modal-box">
            <h3 id="t-new-msg">رسالة جديدة</h3>
            <input type="email" id="msg-to" placeholder="إلى المستلم: (example@brid.com)">
            <textarea id="msg-body" placeholder="اكتب نص الرسالة هنا..."></textarea>
            <div style="display: flex; gap: 10px; flex-wrap: wrap;">
                <button class="btn-green" style="background:#3498db; width: auto;" onclick="app.sendMail()" id="t-send-final">إرسال</button>
                <input type="file" id="file-picker" hidden multiple>
                <button class="btn-green" style="background:#eee; color:#000; width: auto;" onclick="document.getElementById('file-picker').click()">📁 ملفات/صور/فيديو</button>
                <button class="btn-green" style="background:var(--accent-red); width: auto;" onclick="app.hideCompose()">إلغاء</button>
            </div>
        </div>
    </div>

    <div id="settings-modal" class="modal-overlay hidden">
        <div class="modal-box">
            <h3 id="t-set-title">الإعدادات</h3>
            <label id="t-label-name">تغيير اسمك:</label>
            <input type="text" id="new-name-field">
            <button class="btn-green" style="padding: 10px; font-size: 14px;" onclick="app.updateName()">حفظ الاسم الجديد</button>
            
            <hr>
            <label id="t-label-lang">تغيير اللغة (5 لغات):</label>
            <div class="lang-switch-box" style="margin-top:10px;">
                <div class="lang-tag" onclick="app.setLang('ar')">العربية</div>
                <div class="lang-tag" onclick="app.setLang('en')">English</div>
                <div class="lang-tag" onclick="app.setLang('fr')">Français</div>
                <div class="lang-tag" onclick="app.setLang('es')">Español</div>
                <div class="lang-tag" onclick="app.setLang('tr')">Türkçe</div>
            </div>

            <hr>
            <button class="btn-green" style="background: var(--accent-red);" onclick="app.logout()">تسجيل الخروج</button>
            <button class="btn-green" style="background: #7f8c8d; margin-top: 5px;" onclick="app.hideSettings()">إغلاق</button>
            
            <div id="logout-status" class="hidden logout-timer">جاري تسجيل الخروج (3)...</div>
        </div>
    </div>

    <script>
        const app = {
            lang: 'ar',
            user: { name: "", email: "" },

            setLang: function(l) {
                this.lang = l;
                document.querySelectorAll('.lang-tag').forEach(t => {
                    const tagText = t.innerText.toLowerCase();
                    if(tagText.includes(l) || (l==='ar' && tagText==='العربية')) t.classList.add('active');
                    else t.classList.remove('active');
                });
                this.updateUI();
            },

            validateLogin: function() {
                const n = document.getElementById('reg-name').value;
                let e = document.getElementById('reg-email').value;
                const p = document.getElementById('reg-pass').value;
                const err = document.getElementById('error-box');

                err.style.display = 'block';
                
                // التأكد من ملء البيانات
                if(!n || !e || !p) { err.innerText = "يرجى ملء كافة الخانات!"; return; }

                // التحقق من أن كلمة المرور 8 أرقام
                if(p.length !== 8 || isNaN(p)) { err.innerText = "كلمة المرور يجب أن تكون 8 أرقام بالضبط!"; return; }

                // التحقق من النطاق @brid.com
                // إذا كتب المستخدم الإيميل كاملاً أو الاسم فقط، سنقوم بدمجه
                if (!e.toLowerCase().endsWith("@brid.com")) {
                    err.innerText = "البريد يجب أن ينتهي بـ @brid.com حصراً!";
                    return;
                }

                this.user.name = n;
                this.user.email = e;
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
                this.updateUI();
            },

            updateUI: function() {
                const isAr = this.lang === 'ar';
                document.documentElement.dir = isAr ? "rtl" : "ltr";
                
                const dict = {
                    ar: { regT: "إنشاء حساب Al-Barid", done: "تم", search: "ابحث...", settings: "الإعدادات", welcome: `مرحباً بك، ${this.user.name}`, empty: "لا توجد رسائل جديدة.", newM: "رسالة جديدة", send: "إرسال", setT: "الإعدادات", labelN: "تغيير اسمك:", labelL: "تغيير اللغة:" },
                    en: { regT: "Create Al-Barid Account", done: "Done", search: "Search...", settings: "Settings", welcome: `Welcome, ${this.user.name}`, empty: "Inbox is empty.", newM: "New Message", send: "Send", setT: "Settings", labelN: "Change Name:", labelL: "Change Language:" },
                    fr: { regT: "Créer un compte Al-Barid", done: "Terminé", search: "Chercher...", settings: "Paramètres", welcome: `Bienvenue, ${this.user.name}`, empty: "La boîte est vide.", newM: "Nouveau message", send: "Envoyer", setT: "Paramètres", labelN: "Changer le nom:", labelL: "Changer la langue:" },
                    es: { regT: "Crear cuenta Al-Barid", done: "Hecho", search: "Buscar...", settings: "Ajustes", welcome: `Bienvenido, ${this.user.name}`, empty: "Bandeja vacía.", newM: "Nuevo mensaje", send: "Enviar", setT: "Ajustes", labelN: "Cambiar nombre:", labelL: "Cambiar idioma:" },
                    tr: { regT: "Al-Barid Hesabı Oluştur", done: "Tamam", search: "Ara...", settings: "Ayarlar", welcome: `Hoş geldin, ${this.user.name}`, empty: "Gelen kutusu boş.", newM: "Yeni Mesaj", send: "Gönder", setT: "Ayarlar", labelN: "İsmi değiştir:", labelL: "Dili değiştir:" }
                };

                const t = dict[this.lang];
                document.getElementById('t-reg-title').innerText = t.regT;
                document.getElementById('t-btn-done').innerText = t.done;
                document.getElementById('t-search-input').placeholder = t.search;
                document.getElementById('t-side-settings').innerText = t.settings;
                document.getElementById('welcome-msg').innerText = t.welcome;
                document.getElementById('t-empty-inbox').innerText = t.empty;
                document.getElementById('t-new-msg').innerText = t.newM;
                document.getElementById('t-send-final').innerText = t.send;
                document.getElementById('t-set-title').innerText = t.setT;
                document.getElementById('t-label-name').innerText = t.labelN;
                document.getElementById('t-label-lang').innerText = t.labelL;
            },

            showCompose: function() { document.getElementById('compose-modal').classList.remove('hidden'); },
            hideCompose: function() { document.getElementById('compose-modal').classList.add('hidden'); },
            
            sendMail: function() {
                const to = document.getElementById('msg-to').value;
                if(to.toLowerCase().endsWith('@brid.com')) {
                    alert("تم الإرسال بنجاح إلى: " + to);
                    this.hideCompose();
                    document.getElementById('notif-red').style.display = 'none';
                } else { 
                    alert("خطأ: يجب أن يكون بريد المستلم تابعاً لـ @brid.com أيضاً!"); 
                }
            },

            showSettings: function() {
                document.getElementById('settings-modal').classList.remove('hidden');
                document.getElementById('new-name-field').value = this.user.name;
            },
            hideSettings: function() { document.getElementById('settings-modal').classList.add('hidden'); },
            updateName: function() {
                const newName = document.getElementById('new-name-field').value;
                if(newName) {
                    this.user.name = newName;
                    this.updateUI();
                    alert("تم تحديث الاسم!");
                }
            },

            logout: function() {
                document.getElementById('logout-status').classList.remove('hidden');
                let count = 3;
                const timer = setInterval(() => {
                    count--;
                    document.getElementById('logout-status').innerText = `جاري تسجيل الخروج (${count})...`;
                    if(count <= 0) { clearInterval(timer); location.reload(); }
                }, 1000);
            }
        };
    </script>
</body>
</html>
