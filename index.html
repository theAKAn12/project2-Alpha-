<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Al-Barid Electro | البريد الإلكتروني</title>
    <style>
        :root {
            --bg-main: #d9e2e9;
            --header-peach: #f9e4d4;
            --accent-orange: #fbb03b;
            --accent-red: #ff3b3b;
            --border-black: #000000;
            --input-gray: #bdc3c7;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: var(--bg-main);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .hidden { display: none !important; }

        /* --- شاشة التسجيل المحسنة مع خيار اللغة --- */
        #auth-screen {
            background: white;
            padding: 30px;
            border: 4px solid var(--border-black);
            border-radius: 20px;
            width: 380px;
            box-shadow: 10px 10px 0px rgba(0,0,0,0.1);
        }
        .lang-switch-auth {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 15px;
        }
        .lang-btn-small {
            padding: 5px 15px;
            border: 2px solid #000;
            border-radius: 15px;
            cursor: pointer;
            font-size: 13px;
            background: #eee;
        }
        .lang-btn-small.active { background: var(--accent-orange); color: white; }

        .auth-form input, .auth-form select {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 2px solid var(--border-black);
            border-radius: 8px;
            box-sizing: border-box;
        }
        .btn-done {
            width: 100%;
            padding: 12px;
            background: #2ecc71;
            color: white;
            border: 2px solid var(--border-black);
            font-weight: bold;
            cursor: pointer;
            border-radius: 8px;
            margin-top: 10px;
        }

        /* --- الهيدر (كما في الصورة) --- */
        .top-bar {
            width: 95%;
            max-width: 1000px;
            background-color: var(--header-peach);
            border: 4px solid var(--border-black);
            border-radius: 50px;
            padding: 10px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .logo-section { display: flex; align-items: center; gap: 15px; }
        .brand-text { font-size: 28px; font-weight: bold; }
        .text-barid { color: #ff8c8c; text-decoration: underline; }
        .text-electro { color: var(--accent-orange); font-style: italic; }
        .text-arabic-logo { font-size: 32px; font-family: 'Amiri', serif; }

        .search-box {
            background-color: var(--input-gray);
            border: 3px solid var(--border-black);
            border-radius: 5px;
            padding: 8px 15px;
            width: 35%;
            display: flex;
            align-items: center;
        }
        .search-box input {
            background: transparent; border: none; width: 100%; outline: none; font-size: 16px;
        }

        .profile-area { position: relative; cursor: pointer; }
        .user-circle {
            width: 50px; height: 50px; background-color: var(--accent-orange);
            border: 3px solid var(--border-black); border-radius: 50%;
        }
        .notif-dot {
            width: 18px; height: 18px; background-color: var(--accent-red);
            border: 2px solid var(--border-black); border-radius: 50%;
            position: absolute; top: -2px; left: -2px;
        }

        /* --- الجانب الأيمن والأزرار --- */
        .app-container {
            width: 95%; max-width: 1000px;
            display: grid; grid-template-columns: 220px 1fr; gap: 20px;
        }

        .btn-create {
            background-color: var(--header-peach);
            border: 3px solid var(--border-black);
            border-radius: 20px; padding: 15px;
            font-size: 18px; font-weight: bold; cursor: pointer;
            margin-bottom: 15px; width: 100%;
        }

        .btn-settings {
            background-color: var(--input-gray);
            border: 3px solid var(--border-black);
            border-radius: 25px; padding: 10px; cursor: pointer; width: 100%;
        }

        .main-content {
            background: rgba(255,255,255,0.5);
            border: 3px solid var(--border-black);
            border-radius: 15px; padding: 20px; min-height: 350px;
        }

        /* --- نافذة الرسائل --- */
        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); display: flex; justify-content: center; align-items: center; z-index: 1000;
        }
        .modal-body {
            background: white; border: 4px solid var(--border-black);
            border-radius: 20px; width: 500px; padding: 20px;
        }
        .modal-body textarea { width: 100%; height: 180px; margin: 10px 0; border: 2px solid #000; border-radius: 8px; padding: 10px; box-sizing: border-box; }
        .send-btn { background: #3498db; color: white; padding: 10px 20px; border-radius: 8px; border: 2px solid #000; cursor: pointer; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="lang-switch-auth">
            <div class="lang-btn-small active" onclick="setLanguage('ar')">العربية</div>
            <div class="lang-btn-small" onclick="setLanguage('en')">English</div>
        </div>
        <div class="auth-form">
            <h2 id="auth-title">إنشاء حساب</h2>
            <label id="label-country">الدولة:</label>
            <select id="country-list">
                <option value="MA">المغرب 🇲🇦</option>
                <option value="DZ">الجزائر 🇩🇿</option>
                <option value="FR">فرنسا 🇫🇷</option>
            </select>
            <input type="text" id="user-name" placeholder="الاسم الكامل">
            <input type="email" id="user-email" placeholder="البريد الإلكتروني">
            <input type="password" id="user-pass" placeholder="كلمة المرور">
            <button class="btn-done" onclick="register()" id="btn-submit">تم</button>
        </div>
    </div>

    <div id="main-app" class="hidden">
        <header class="top-bar">
            <div class="logo-section">
                <div class="brand-text">Al-<span class="text-barid">Barid</span> <span class="text-electro">electro</span></div>
            </div>
            <div class="search-box">
                <input type="text" id="search-input" placeholder="ابحث...">
            </div>
            <div class="text-arabic-logo">الـبـريـد</div>
            <div class="profile-area" onclick="toggleSettings()">
                <div class="user-circle"></div>
                <div id="notif" class="notif-dot"></div>
            </div>
        </header>

        <div class="app-container">
            <aside class="sidebar">
                <button class="btn-create" onclick="showCompose()" id="btn-compose-main">
                    + إنشاء <br> Create
                </button>
                <button id="settings-btn" class="btn-settings" onclick="toggleSettings()">الإعدادات</button>
            </aside>
            <main class="main-content">
                <h3 id="welcome-txt">مرحباً بك</h3>
                <hr>
                <div id="mail-list-text">لا توجد رسائل حالياً.</div>
            </main>
        </div>
    </div>

    <div id="compose-modal" class="modal hidden">
        <div class="modal-body">
            <h3 id="modal-title">رسالة جديدة</h3>
            <input type="email" id="target-email" placeholder="إلى (البريد الإلكتروني)">
            <textarea id="mail-content" placeholder="اكتب رسالتك هنا..."></textarea>
            <div style="display: flex; justify-content: space-between;">
                <input type="file" id="f-picker" hidden>
                <button class="send-btn" style="background:#eee; color:#000" onclick="document.getElementById('f-picker').click()">📎 ملفات</button>
                <div>
                    <button class="send-btn" onclick="sendMail()" id="btn-send-final">إرسال</button>
                    <button class="send-btn" style="background: #e74c3c;" onclick="hideCompose()">إلغاء</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentLang = 'ar';

        function setLanguage(lang) {
            currentLang = lang;
            const btns = document.querySelectorAll('.lang-btn-small');
            btns.forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            updateUI();
        }

        function updateUI() {
            const isAr = currentLang === 'ar';
            document.documentElement.dir = isAr ? "rtl" : "ltr";
            
            // نصوص شاشة التسجيل
            document.getElementById('auth-title').innerText = isAr ? "إنشاء حساب" : "Create Account";
            document.getElementById('label-country').innerText = isAr ? "الدولة:" : "Country:";
            document.getElementById('user-name').placeholder = isAr ? "الاسم الكامل" : "Full Name";
            document.getElementById('user-email').placeholder = isAr ? "البريد الإلكتروني" : "Email Address";
            document.getElementById('user-pass').placeholder = isAr ? "كلمة المرور" : "Password";
            document.getElementById('btn-submit').innerText = isAr ? "تم" : "Done";

            // نصوص الواجهة الرئيسية
            document.getElementById('search-input').placeholder = isAr ? "ابحث..." : "Search...";
            document.getElementById('settings-btn').innerText = isAr ? "الإعدادات" : "Settings";
            document.getElementById('mail-list-text').innerText = isAr ? "لا توجد رسائل حالياً." : "No messages yet.";
            document.getElementById('modal-title').innerText = isAr ? "رسالة جديدة" : "New Message";
            document.getElementById('target-email').placeholder = isAr ? "إلى (البريد الإلكتروني)" : "To (Email)";
            document.getElementById('mail-content').placeholder = isAr ? "اكتب هنا..." : "Type here...";
            document.getElementById('btn-send-final').innerText = isAr ? "إرسال" : "Send";
        }

        function register() {
            const name = document.getElementById('user-name').value;
            const email = document.getElementById('user-email').value;
            if(name && email) {
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
                document.getElementById('welcome-txt').innerText = (currentLang === 'ar' ? "مرحباً " : "Welcome ") + name;
            } else {
                alert(currentLang === 'ar' ? "املأ الخانات!" : "Fill the fields!");
            }
        }

        function showCompose() { document.getElementById('compose-modal').classList.remove('hidden'); }
        function hideCompose() { document.getElementById('compose-modal').classList.add('hidden'); }

        function sendMail() {
            alert(currentLang === 'ar' ? "تم الإرسال!" : "Sent Successfully!");
            hideCompose();
            document.getElementById('notif').style.display = 'none';
        }

        function toggleSettings() {
            const opt = confirm(currentLang === 'ar' ? "الإعدادات: موافق لتغيير اللغة، إلغاء للخروج" : "Settings: OK to switch language, Cancel to logout");
            if(opt) {
                currentLang = (currentLang === 'ar' ? 'en' : 'ar');
                updateUI();
            } else {
                location.reload();
            }
        }
    </script>
</body>
</html>
